name: Build wpa_supplicant for ARM uClibc
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: |
          sudo apt-get install -y -qq libmpfr-dev && sudo ln -sf /usr/lib/x86_64-linux-gnu/libmpfr.so.6 /usr/lib/x86_64-linux-gnu/libmpfr.so.4 2>/dev/null; true
          curl -sL -o tc.tar.bz2 "https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--uclibc--stable-2018.02-1.tar.bz2"
          tar xf tc.tar.bz2 2>/dev/null
          mv armv7-eabihf--uclibc--stable-2018.02-1 tc
          curl -sL -o wpa.tar.gz "https://w1.fi/releases/wpa_supplicant-2.10.tar.gz"
          tar xzf wpa.tar.gz
      - name: Build
        run: |
          export PATH="$PWD/tc/bin:$PATH"
          SYSROOT="$PWD/tc/arm-buildroot-linux-uclibcgnueabihf/sysroot"
          cd wpa_supplicant-2.10/wpa_supplicant
          cat > .config << 'EOF'
          CONFIG_DRIVER_NL80211=y
          CONFIG_LIBNL32=y
          CONFIG_CTRL_IFACE=y
          CONFIG_BACKEND=file
          CONFIG_TLS=internal
          CONFIG_INTERNAL_LIBTOMMATH=y
          CONFIG_TLSV11=y
          CONFIG_TLSV12=y
          CONFIG_DEBUG_LEVEL=0
          CONFIG_NO_STDOUT_DEBUG=y
          EOF
          make -j$(nproc) \
            CC=arm-buildroot-linux-uclibcgnueabihf-gcc \
            LDFLAGS="-static" \
            LIBS="-L${SYSROOT}/usr/lib -lnl-3 -lnl-genl-3 -lpthread -lm" \
            EXTRA_CFLAGS="-I${SYSROOT}/usr/include/libnl3 -Os" 2>&1 | tail -15
          arm-buildroot-linux-uclibcgnueabihf-strip wpa_supplicant 2>/dev/null || true
          ls -lh wpa_supplicant 2>/dev/null || echo "BUILD FAILED"
          file wpa_supplicant 2>/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: wpa_supplicant-arm-uclibc
          path: wpa_supplicant-2.10/wpa_supplicant/wpa_supplicant
